<!DOCTYPE html>
<html>
<head>
<title>WhatsApp Clone</title>

<style>

body{
margin:0;
font-family:Arial;
background:#ece5dd;
}

/* LOCK SCREEN */

.lock{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#128C7E;
}

.lock-box{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
}

.lock-box input{
padding:10px;
margin:10px;
}

.fingerprint{
font-size:40px;
cursor:pointer;
}

/* APP */

.container{
display:none;
height:100vh;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#075E54;
color:white;
display:flex;
flex-direction:column;
}

.profile{
padding:15px;
display:flex;
align-items:center;
gap:10px;
}

.profile img{
border-radius:50%;
}

.search{
padding:10px;
}

.search input{
width:100%;
padding:8px;
border-radius:20px;
border:none;
}

.chat-list{
flex:1;
overflow-y:auto;
}

.chat-item{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.1);
cursor:pointer;
}

.chat-item:hover{
background:#128C7E;
}

.menu button{
background:none;
border:none;
color:white;
padding:10px;
cursor:pointer;
text-align:left;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
background:white;
}

.section{
display:none;
flex-direction:column;
height:100%;
}

.section.active{
display:flex;
}

/* CHAT */

.chat-header{
background:#075E54;
color:white;
padding:15px;
}

.chatbox{
flex:1;
padding:10px;
overflow-y:auto;
background:#e5ddd5;
}

.message{
padding:8px 12px;
margin:6px;
border-radius:10px;
max-width:60%;
}

.sent{
background:#dcf8c6;
margin-left:auto;
}

.received{
background:white;
}

.input-area{
display:flex;
align-items:center;
padding:10px;
background:#f0f0f0;
}

.input-area input{
flex:1;
padding:10px;
border:none;
border-radius:20px;
}

.input-area button{
margin-left:5px;
padding:8px;
background:#25D366;
border:none;
color:white;
cursor:pointer;
}

/* EMOJI PANEL */

.emoji-panel{
display:none;
position:absolute;
bottom:80px;
background:white;
border:1px solid #ccc;
padding:10px;
}

.emoji{
font-size:20px;
cursor:pointer;
margin:4px;
}

/* STATUS */

.status-item{
padding:10px;
border-bottom:1px solid #ddd;
}

/* CALL */

.call-item{
padding:10px;
border-bottom:1px solid #ddd;
display:flex;
justify-content:space-between;
}

</style>
</head>

<body>

<!-- LOCK SCREEN -->

<div class="lock" id="lockScreen">

<div class="lock-box">

<h3>Unlock WhatsApp</h3>

<input type="password" id="password" placeholder="Password">

<br>

<button onclick="passwordUnlock()">Unlock</button>

<p>or</p>

<div class="fingerprint" onclick="fingerprintUnlock()">👆</div>

</div>

</div>

<!-- APP -->

<div class="container" id="app">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="profile">

<img src="https://i.pravatar.cc/40">

<span>Mahee</span>

</div>

<div class="search">

<input placeholder="Search..." onkeyup="searchChat(this.value)">

</div>

<div class="chat-list" id="chatList">

<div class="chat-item" onclick="openChat('Rahul')">Rahul</div>
<div class="chat-item" onclick="openChat('Amisha')">Amisha</div>
<div class="chat-item" onclick="openChat('Mona')">Mona</div>
<div class="chat-item" onclick="openChat('Ram')">Ram</div>

</div>

<div class="menu">

<button onclick="createGroup()">Create Group</button>
<button onclick="showSection('chat')">Chats</button>
<button onclick="showSection('status')">Status</button>
<button onclick="showSection('calls')">Calls</button>
<button onclick="showSection('archived')">Archived</button>
<button onclick="showSection('settings')">Settings</button>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- CHAT -->

<div id="chat" class="section active">

<div class="chat-header" id="chatName">
Select Chat
</div>

<div class="chatbox" id="chatbox"></div>

<div class="emoji-panel" id="emojiPanel">

<span class="emoji" onclick="addEmoji('😀')">😀</span>
<span class="emoji" onclick="addEmoji('😂')">😂</span>
<span class="emoji" onclick="addEmoji('😍')">😍</span>
<span class="emoji" onclick="addEmoji('👍')">👍</span>

</div>

<div class="input-area">

<button onclick="toggleEmoji()">😊</button>

<input id="messageInput" placeholder="Type message">

<input type="file" id="fileInput" onchange="sendFile()" style="display:none">

<button onclick="document.getElementById('fileInput').click()">📎</button>

<button onclick="sendMessage()">Send</button>

</div>

</div>

<!-- STATUS -->

<div id="status" class="section">

<h2 style="padding:15px;">Status</h2>

<div class="status-item">Rahul: On vacation 🌴</div>
<div class="status-item">Amisha: Studying 📚</div>

</div>

<!-- CALLS -->

<div id="calls" class="section">

<h2 style="padding:15px;">Calls</h2>

<div class="call-item">

<span>Rahul</span>

<button onclick="callUser('Rahul')">Call</button>

</div>

</div>

<!-- ARCHIVED -->

<div id="archived" class="section">

<h2 style="padding:15px;">Archived</h2>

<div class="status-item">Old chat</div>

</div>

<!-- SETTINGS -->

<div id="settings" class="section">

<h2 style="padding:15px;">Settings</h2>

<div onclick="logout()">Logout</div>

</div>

</div>

</div>

<script>

/* AUTH */

function passwordUnlock(){

if(document.getElementById("password").value==="1234"){
unlock();
}else{
alert("Wrong password");
}

}

function fingerprintUnlock(){

alert("Fingerprint verified (demo)");

unlock();

}

function unlock(){

document.getElementById("lockScreen").style.display="none";
document.getElementById("app").style.display="flex";

}

/* CHAT SYSTEM */

let currentUser="";
let chats={};

function openChat(name){

currentUser=name;

document.getElementById("chatName").innerText=name;

let chatbox=document.getElementById("chatbox");

chatbox.innerHTML="";

if(!chats[name]) chats[name]=[];

chats[name].forEach(msg=>chatbox.appendChild(msg));

}

/* SEND MESSAGE */

function sendMessage(){

let input=document.getElementById("messageInput");

let text=input.value;

if(text===""||currentUser==="") return;

let msg=document.createElement("div");

msg.className="message sent";

msg.innerText=text;

document.getElementById("chatbox").appendChild(msg);

chats[currentUser].push(msg);

input.value="";

}

/* EMOJI */

function toggleEmoji(){

let panel=document.getElementById("emojiPanel");

panel.style.display=panel.style.display==="block"?"none":"block";

}

function addEmoji(e){

document.getElementById("messageInput").value+=e;

}

/* FILE */

function sendFile(){

let file=document.getElementById("fileInput").files[0];

let msg=document.createElement("div");

msg.className="message sent";

if(file.type.startsWith("image")){

let img=document.createElement("img");

img.src=URL.createObjectURL(file);

img.style.maxWidth="150px";

msg.appendChild(img);

}else{

msg.innerText=file.name;

}

document.getElementById("chatbox").appendChild(msg);

}

/* SEARCH */

function searchChat(text){

document.querySelectorAll(".chat-item").forEach(chat=>{

chat.style.display=chat.innerText.toLowerCase().includes(text.toLowerCase())?"block":"none";

});

}

/* GROUP */

function createGroup(){

let name=prompt("Enter group name");

if(name){

let div=document.createElement("div");

div.className="chat-item";

div.innerText=name+" (Group)";

div.onclick=()=>openChat(name);

document.getElementById("chatList").appendChild(div);

}

}

/* NAVIGATION */

function showSection(id){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));

document.getElementById(id).classList.add("active");

}

/* CALL */

function callUser(name){

alert("Calling "+name+" 📞");

}

/* LOGOUT */

function logout(){

location.reload();

}

</script>

</body>
</html>
